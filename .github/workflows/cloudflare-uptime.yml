name: Cloudflare uptime check

on:
  workflow_dispatch:
  schedule:
    - cron: '20 0 * * *'

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public application
        run: curl --fail --show-error --silent --retry 3 --retry-delay 5 https://campus-maintenance.stievefjfyufuf.workers.dev/ > /dev/null
      - name: Check Worker API health
        run: test "$(curl --fail --show-error --silent --retry 3 --retry-delay 5 -H 'Accept: application/json' https://campus-maintenance.stievefjfyufuf.workers.dev/api/health)" = '{"ok":true}'

